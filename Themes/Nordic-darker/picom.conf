rounded-corners-exclude = [
    "override_redirect = true",
]

fading = true
fade-in-step = 0.08;
fade-out-step = 0.08;


#inactive-opacity = 0.85

#focus-exclude = ["x = 0 && y = 0 && override_redirect = true"];

opacity-rule = [
    "88:class_g = 'Code'",
    "92:class_g = 'discord'",
];

mark-wmwin-focused = true;
