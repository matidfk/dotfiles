[bar/bar]
width = 100%
height = 35pt

background = #9a1D1F28
foreground = #FDFDFD

line-size = 5pt

padding-left = 1
padding-right = 1

module-margin = 1

separator = |
separator-foreground = #5aC5C8C6

font-0 = Hack;2

modules-left = xwindow
modules-center = xworkspaces
modules-right = date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

tray-position = left

wm-restack = bspwm

; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = #00000000
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = #FFFFFF
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = #5aC5C8C6
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/date]
type = internal/date
interval = 1

date = %A %e. %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = #EAEAEA

[settings]
screenchange-reload = true
pseudo-transparency = true
