shadow = true;
shadow-radius = 30;
shadow-opacity = 1.0;
shadow-offset-x = -25;
shadow-offset-y = -25;
shadow-exclude = [
  "name = 'Notification'",
  "class_g ?= 'Notify-osd'",
  "_GTK_FRAME_EXTENTS@:c",
  "x = 0 && y = 0 && override_redirect = true",
];

fading = true
fade-in-step = 0.08;
fade-out-step = 0.08;
fade-delta = 10

backend = "xrender";

mark-wmwin-focused = true;

mark-ovredir-focused = false;

wintypes:
{
  tooltip = { fade = true; shadow = false; opacity = 1.0; focus = true; };
  dock = { shadow = false; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 1.0; shadow = false; }
  dropdown_menu = { opacity = 1.0; shadow = false;}
};
